# Render Blueprint — deploys the Passei backend + a Postgres database.
# Push this repo to GitHub, then in Render: "New +" → "Blueprint" → select repo.
services:
  - type: web
    name: passei-api
    runtime: node
    rootDir: server
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    disk:
      name: uploads
      mountPath: /opt/render/project/src/server/uploads
      sizeGB: 1
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: passei-db
          property: connectionString
      - key: DATABASE_SSL
        value: "true"
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 30d
      - key: ADMIN_EMAILS
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_SUBJECT
        value: mailto:admin@passeii.com
      - key: CRON_SECRET
        generateValue: true
      - key: UPLOAD_DIR
        value: /opt/render/project/src/server/uploads

databases:
  - name: passei-db
    plan: basic-256mb
