# Render Blueprint — deploys the Passei backend on the FREE plan.
# Database: use an external free Postgres (Neon) — paste its URL into DATABASE_URL.
# Uploads: stored on Cloudinary (free) — paste CLOUDINARY_URL.
# Push this repo to GitHub, then in Render: "New +" → "Blueprint" → select repo.
services:
  - type: web
    name: passei-api
    runtime: node
    rootDir: server
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      # Neon (or other) Postgres connection string. Paste in the Render dashboard.
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_SSL
        value: "true"
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 30d
      - key: ADMIN_EMAILS
        sync: false
      - key: CORS_ORIGINS
        sync: false
      # Cloudinary credentials (Account Details → "API Environment variable").
      # Format: cloudinary://<api_key>:<api_secret>@<cloud_name>
      - key: CLOUDINARY_URL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_SUBJECT
        value: mailto:admin@passeii.com
      - key: CRON_SECRET
        generateValue: true
